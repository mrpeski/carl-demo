<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Interactive Exhibit</title>
  <meta name="description" content="Interactive sacred art exhibit" />
  <link rel="preconnect" href="" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-mode="auto">
  <!-- App is rendered into #app from data/exhibit.json by js/app.js -->
  <main id="app" aria-live="polite">
    <div id="loader" class="loader">Loading exhibit…</div>
  </main>

  <!-- ===== Templates (cloned at runtime) ===== -->

  <!-- Main stage: painting + hotspots + mobile title bar -->
  <template id="tpl-stage">
   <div class="exhibit">
    <header class="exhibit-header">
      <div class="exhibit-titles">
        <h1 class="exhibit-title"></h1>
        <p class="exhibit-meta"></p>
      </div>
      <button class="btn-fullscreen" type="button" aria-label="Toggle fullscreen" title="Fullscreen">⛶</button>
    </header>

    <p class="exhibit-intro"></p>

    <div class="stage">
      <div class="frame">
        <img class="painting" alt="" draggable="false" />
        <div class="hotspots" role="group" aria-label="Interactive regions of the painting"></div>
      </div>
    </div>

    <!-- Mobile / narrow screens: list of titles instead of hotspots -->
    <nav class="title-bar" aria-label="Painting details">
      <ul class="title-list"></ul>
    </nav>
   </div>
  </template>

  <!-- Modal video player -->
  <template id="tpl-modal">
    <div class="modal-overlay" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" type="button" aria-label="Close">✕</button>
        <div class="modal-video-wrap">
          <video class="modal-video" controls playsinline preload="metadata"></video>
          <div class="modal-video-placeholder" hidden>
            <p>Explainer video will appear here.</p>
          </div>
        </div>
        <div class="modal-body">
          <h2 id="modal-title" class="modal-title"></h2>
          <p class="modal-duration"></p>
          <p class="modal-text"></p>
        </div>
      </div>
    </div>
  </template>

  <!-- Attract / idle screen (kiosk) -->
  <template id="tpl-attract">
    <div class="attract" hidden>
      <div class="attract-inner">
        <h1 class="attract-title"></h1>
        <p class="attract-subtitle"></p>
        <p class="attract-prompt"></p>
        <span class="attract-touch" aria-hidden="true">👆</span>
      </div>
    </div>
  </template>

  <script src="js/app.js"></script>
</body>
</html>
